<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSQ Self-Reflection — The Children's Center</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2744; --navy-light: #253561; --navy-muted: #3d5080;
  --gold: #c8973a; --gold-light: #e8b85a; --gold-pale: #fdf6e8;
  --cream: #faf8f4; --cream2: #f2ede4; --border: #ddd6c8;
  --text: #2c2c2c; --muted: #6b7280;
  --green: #2d7a4a; --green-bg: #e8f5ed; --green-border: #b8e0c8;
  --red: #b03030; --red-bg: #fde8e8; --red-border: #f5c5c5;
  --amber: #a05c1a; --amber-bg: #fef3e2;
  --white: #ffffff;
  --shadow: 0 2px 12px rgba(26,39,68,.10); --shadow-lg: 0 8px 32px rgba(26,39,68,.16);
  --r: 10px; --r-sm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy);background-image:radial-gradient(ellipse at 30% 30%,#253561 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,#0f1a30 0%,transparent 60%)}
.login-card{background:white;border-radius:16px;padding:48px 44px;width:420px;max-width:95vw;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--navy)}
.login-logo p{color:var(--muted);font-size:.875rem;margin-top:4px}
.login-logo .star{font-size:2rem;margin-bottom:8px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-family:'Source Sans 3',sans-serif;font-size:.95rem;transition:border .2s}
.field input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;background:var(--navy);color:white;border:none;border-radius:var(--r-sm);padding:12px;font-family:'Source Sans 3',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:4px}
.login-btn:hover{background:var(--navy-light)}
.login-error{color:var(--red);font-size:.85rem;margin-top:10px;text-align:center;min-height:20px}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100vh}
.topbar{background:var(--navy);height:58px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem;font-weight:600;white-space:nowrap}
.topbar-logo span{color:rgba(255,255,255,.5);font-family:'Source Sans 3',sans-serif;font-weight:300;font-size:.75rem;display:block;margin-top:-2px}
.loc-switcher{display:flex;gap:4px;margin-left:8px}
.loc-btn{padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.7);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Source Sans 3',sans-serif;white-space:nowrap}
.loc-btn:hover{border-color:var(--gold);color:var(--gold)}
.loc-btn.active{background:var(--gold);border-color:var(--gold);color:var(--navy)}
.topbar-spacer{flex:1}
.nav-tabs{display:flex;gap:2px}
.nav-tab{background:transparent;border:none;color:rgba(255,255,255,.65);padding:7px 14px;border-radius:var(--r-sm);cursor:pointer;font-family:'Source Sans 3',sans-serif;font-size:.83rem;font-weight:500;transition:all .2s;white-space:nowrap}
.nav-tab:hover{background:rgba(255,255,255,.1);color:white}
.nav-tab.active{background:var(--gold);color:var(--navy);font-weight:700}
.user-pill{display:flex;align-items:center;gap:8px;padding:5px 12px;background:rgba(255,255,255,.08);border-radius:20px;margin-left:8px;font-size:.8rem;color:rgba(255,255,255,.8)}
.user-pill button{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:.8rem;padding:0 0 0 4px}
.user-pill button:hover{color:white}

/* ── LAYOUT ── */
.app-body{display:flex;flex:1;min-height:0}
.sidebar{width:265px;min-width:265px;background:white;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto}

/* ── SIDEBAR ── */
.sidebar-section{padding:10px 0;border-bottom:1px solid var(--border)}
.sidebar-section-title{padding:8px 18px 4px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.sidebar-item{padding:9px 18px;cursor:pointer;border-left:3px solid transparent;display:flex;flex-direction:column;gap:3px;transition:all .15s}
.sidebar-item:hover{background:var(--cream)}
.sidebar-item.active{background:var(--cream2);border-left-color:var(--gold)}
.sidebar-item-name{font-weight:600;font-size:.875rem;color:var(--navy);line-height:1.3}
.sidebar-prog{display:flex;align-items:center;gap:7px}
.prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.prog-text{font-size:.72rem;color:var(--muted);white-space:nowrap}

/* ── VIEWS ── */
.view{display:none}.view.active{display:block}

/* ── DASHBOARD ── */
.dash{padding:28px 32px;max-width:1040px}
.dash h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--navy);margin-bottom:4px}
.dash-sub{color:var(--muted);margin-bottom:28px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.stat{background:white;border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.stat .val{font-family:'Playfair Display',serif;font-size:2rem;color:var(--navy);line-height:1}
.stat .lbl{font-size:.75rem;color:var(--muted);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.sec-card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.sec-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--gold)}
.sec-card h3{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:10px}
.sec-card .bar{height:7px;background:var(--cream2);border-radius:4px;overflow:hidden;margin-bottom:7px}
.sec-card .bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .5s}
.sec-card .pct{font-size:.82rem;color:var(--muted)}

/* ── SECTION EDITOR ── */
.sec-editor{padding:28px 32px}
.sec-editor-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px}
.sec-editor-hdr h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy)}
.sec-editor-hdr p{color:var(--muted);font-size:.875rem;margin-top:3px;max-width:680px;line-height:1.5}

/* ── ITEM CARD ── */
.item-card{background:white;border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.item-hdr{padding:15px 18px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:background .15s}
.item-hdr:hover{background:var(--cream)}
.item-num{background:var(--navy);color:white;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:1px;transition:background .2s}
.item-num.done{background:var(--green)}
.item-num.partial{background:var(--amber)}
.item-info{flex:1}
.item-title{font-weight:700;font-size:.9rem;color:var(--navy);line-height:1.35}
.item-sub{font-size:.78rem;color:var(--muted);margin-top:3px;line-height:1.5}
.item-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.badge{display:inline-flex;align-items:center;gap:3px;background:var(--cream2);border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:.72rem;color:var(--muted)}
.badge.green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.badge.gold{background:var(--gold-pale);border-color:#e8c87a;color:var(--amber)}
.expand-icon{color:var(--muted);font-size:1rem;transition:transform .2s;flex-shrink:0;margin-top:4px}
.item-hdr.open .expand-icon{transform:rotate(180deg)}

.item-body{border-top:1px solid var(--border);display:none}
.item-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 18px;gap:0}
.itab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-size:.82rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;font-family:'Source Sans 3',sans-serif}
.itab:hover{color:var(--navy)}
.itab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700}
.tab-body{display:none;padding:18px}.tab-body.active{display:block}

/* ── NARRATIVE ── */
.criteria-box{background:var(--gold-pale);border:1px solid #e8c87a;border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px;font-size:.82rem;line-height:1.6}
.criteria-box strong{color:var(--amber);display:block;margin-bottom:4px;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em}
.criteria-list{list-style:none;padding:0}
.criteria-list li{padding:2px 0 2px 16px;position:relative}
.criteria-list li::before{content:'✓';position:absolute;left:0;color:var(--amber)}
.note-box{background:#f0f4ff;border:1px solid #c5d0f0;border-radius:var(--r-sm);padding:9px 12px;margin-bottom:12px;font-size:.8rem;color:#3d5080}
textarea.narr{width:100%;min-height:110px;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;font-family:'Source Sans 3',sans-serif;font-size:.9rem;line-height:1.6;resize:vertical;transition:border .2s;background:var(--cream)}
textarea.narr:focus{outline:none;border-color:var(--gold);background:white}
.rating-row{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
.rbn{padding:5px 13px;border-radius:20px;border:2px solid var(--border);background:white;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Source Sans 3',sans-serif}
.rbn[data-v="1"].sel{background:var(--red);border-color:var(--red);color:white}
.rbn[data-v="2"].sel{background:var(--amber);border-color:var(--amber);color:white}
.rbn[data-v="3"].sel{background:#6b7280;border-color:#6b7280;color:white}
.rbn[data-v="4"].sel{background:var(--green);border-color:var(--green);color:white}
.rbn[data-v="5"].sel{background:var(--gold);border-color:var(--gold);color:var(--navy)}
.save-row{display:flex;justify-content:flex-end;gap:7px;margin-top:10px}

/* ── POLICY ── */
.policy-search{display:flex;gap:7px;margin-bottom:14px}
.policy-search input{flex:1;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:8px 13px;font-family:'Source Sans 3',sans-serif;font-size:.875rem}
.policy-search input:focus{outline:none;border-color:var(--gold)}
.match-card{border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px;margin-bottom:9px;background:white;transition:border .2s}
.match-card.accepted{border-color:var(--green);background:var(--green-bg)}
.match-card.dismissed{opacity:.38;border-style:dashed}
.match-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.match-src{font-size:.75rem;font-weight:700;color:var(--navy);background:var(--cream2);padding:2px 8px;border-radius:20px}
.match-pg{font-size:.75rem;font-weight:700;color:var(--gold)}
.match-excerpt{font-size:.84rem;line-height:1.6;color:var(--text);font-style:italic;margin-bottom:6px;border-left:3px solid var(--gold);padding-left:10px}
.match-why{font-size:.77rem;color:var(--muted)}
.match-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.matches-section-hdr{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.matches-section-hdr.green{color:var(--green)}
.matches-section-hdr.muted{color:var(--muted)}

/* ── EVIDENCE ── */
.ev-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.ev-item{display:flex;align-items:center;gap:9px;background:var(--cream);border-radius:var(--r-sm);padding:9px 13px;border:1px solid var(--border)}
.ev-icon{font-size:1.15rem;flex-shrink:0}
.ev-name{flex:1;font-size:.85rem;font-weight:600;color:var(--navy)}
.ev-link{color:var(--gold);font-size:.8rem;text-decoration:none;font-weight:600}
.ev-link:hover{text-decoration:underline}

/* ── DOCS VIEW ── */
.docs-view{padding:28px 32px;max-width:900px}
.docs-view h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);margin-bottom:4px}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;background:white;cursor:pointer;transition:all .2s;margin-bottom:18px}
.drop-zone:hover,.drop-zone.drag{border-color:var(--gold);background:var(--gold-pale)}
.drop-zone .dz-icon{font-size:2.2rem;margin-bottom:6px}
.doc-form{background:white;border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:18px;display:none}
.doc-form.show{display:block}
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.fg{flex:1;min-width:180px;display:flex;flex-direction:column;gap:4px}
.fg label{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select{border:1.5px solid var(--border);border-radius:var(--r-sm);padding:8px 11px;font-family:'Source Sans 3',sans-serif;font-size:.875rem}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--gold)}
.doc-list{display:flex;flex-direction:column;gap:9px}
.doc-item{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow)}
.doc-badge{padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:700;background:var(--cream2);color:var(--navy)}
.doc-badge.shared{background:var(--green-bg);color:var(--green)}
.doc-name{flex:1;font-weight:700;font-size:.88rem;color:var(--navy)}
.doc-meta{font-size:.77rem;color:var(--muted)}

/* ── ADMIN VIEW ── */
.admin-view{padding:28px 32px;max-width:800px}
.admin-view h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);margin-bottom:20px}
.admin-section{background:white;border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:18px;box-shadow:var(--shadow)}
.admin-section h3{font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-name{flex:1;font-weight:600;font-size:.88rem}
.user-meta{font-size:.78rem;color:var(--muted)}

/* ── SETTINGS VIEW ── */
.settings-view{padding:28px 32px;max-width:500px}
.settings-view h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);margin-bottom:20px}
.settings-card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,39,68,.5);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:white;border-radius:14px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hdr{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1}
.modal-hdr h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--navy)}
.modal-x{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:3px 7px;border-radius:5px}
.modal-x:hover{background:var(--cream)}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px;background:white}

/* ── BUTTONS ── */
.btn{padding:7px 16px;border-radius:var(--r-sm);border:none;font-family:'Source Sans 3',sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-navy{background:var(--navy);color:white}.btn-navy:hover{background:var(--navy-light)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:white;color:var(--navy);border:1.5px solid var(--border)}.btn-outline:hover{border-color:var(--navy)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}.btn-red:hover{background:var(--red);color:white}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}.btn-green:hover{background:var(--green);color:white}
.btn-sm{padding:4px 10px;font-size:.76rem}
.btn-xs{padding:3px 8px;font-size:.72rem}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite}
.spin.dark{border-color:rgba(0,0,0,.15);border-top-color:var(--navy)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px;color:var(--muted)}
.empty .ei{font-size:2.4rem;margin-bottom:10px}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:white;padding:11px 18px;border-radius:8px;font-size:.85rem;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;max-width:320px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

/* ── NO-SELECT ── */
.no-select-msg{display:flex;align-items:center;justify-content:center;height:100%;min-height:300px;flex-direction:column;gap:10px;color:var(--muted)}
.no-select-msg .ei{font-size:3rem}

/* Evidence Tracker */
.et-section { margin-bottom: 1.5rem; }
.et-section-hdr { font-size: .78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--navy); background: var(--cream2); padding: .4rem 1rem; border-radius: 8px; margin-bottom: .5rem; }
.et-item { background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: .75rem 1rem; margin-bottom: .5rem; transition: border-color .15s; }
.et-item[data-status="uploaded"], .et-item[data-status="done"] { border-color: var(--green); background: var(--green-bg); }
.et-item[data-status="todo"] { border-color: #f59e0b; background: #fffbeb; }
.et-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
.et-item-info { display: flex; align-items: flex-start; gap: .75rem; flex: 1; min-width: 200px; }
.et-indicator-badge { font-size: .72rem; font-weight: 800; background: var(--navy); color: white; padding: 2px 8px; border-radius: 20px; white-space: nowrap; margin-top: 2px; }
.et-item-title { font-size: .88rem; font-weight: 600; color: var(--navy); line-height: 1.4; }
.et-item-sub { font-size: .78rem; color: var(--muted); margin-top: 2px; }
.et-item-actions { display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
.et-status-dot { font-size: .78rem; font-weight: 700; white-space: nowrap; }
.et-notes { font-size: .8rem; color: var(--muted); margin-top: .5rem; padding-top: .5rem; border-top: 1px solid var(--border); font-style: italic; }
.btn-gold { background: #f59e0b; color: white; border-color: #f59e0b; }
.btn-gold:hover { background: #d97706; border-color: #d97706; }

/* Readiness Report */
.rpt-section { margin-bottom: 2rem; }
.rpt-section-hdr { display:flex; justify-content:space-between; align-items:center; background:var(--navy); color:white; padding:.6rem 1.1rem; border-radius:10px 10px 0 0; font-weight:700; font-size:.9rem; }
.rpt-section-score { font-size:.8rem; opacity:.85; }
.rpt-item { border:1.5px solid var(--border); border-top:none; padding:.85rem 1.1rem; background:white; }
.rpt-item:last-child { border-radius:0 0 10px 10px; }
.rpt-item-hdr { display:flex; justify-content:space-between; align-items:flex-start; gap:.75rem; margin-bottom:.5rem; }
.rpt-item-title { font-weight:700; font-size:.88rem; color:var(--navy); }
.rpt-item-sub { font-size:.78rem; color:var(--muted); margin-top:1px; }
.rpt-readiness { display:flex; gap:.35rem; align-items:center; white-space:nowrap; font-size:.78rem; font-weight:700; padding:3px 10px; border-radius:20px; }
.rpt-readiness.full { background:var(--green-bg); color:var(--green); }
.rpt-readiness.partial { background:#fef3c7; color:#92400e; }
.rpt-readiness.none { background:var(--red-bg); color:var(--red); }
.rpt-evidence-list { display:flex; flex-direction:column; gap:.35rem; }
.rpt-ev-row { display:flex; align-items:flex-start; gap:.6rem; font-size:.82rem; padding:.35rem .6rem; border-radius:7px; }
.rpt-ev-row.have { background:var(--green-bg); color:#1a4731; }
.rpt-ev-row.todo { background:#fef3c7; color:#78350f; }
.rpt-ev-row.missing { background:var(--red-bg); color:#7f1d1d; }
.rpt-ev-icon { flex-shrink:0; margin-top:1px; }
.rpt-ev-text { flex:1; line-height:1.4; }
.rpt-ev-source { font-size:.73rem; opacity:.8; margin-top:1px; }
.rpt-summary-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.75rem; }
.rpt-sum-card { flex:1; min-width:130px; background:white; border:1.5px solid var(--border); border-radius:12px; padding:.9rem 1.1rem; text-align:center; }
.rpt-sum-num { font-size:1.8rem; font-weight:800; line-height:1; margin-bottom:.25rem; }
.rpt-sum-lbl { font-size:.75rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
.rpt-print-btn { float:right; }
@media print {
  .topbar, .sidebar, nav, .nav-tabs, #toast, .rpt-print-btn { display:none !important; }
  .view { display:block !important; }
  body { background:white; }
  .rpt-item { break-inside:avoid; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="star">⭐</div>
      <h1>GSQ Self-Reflection</h1>
      <p>Great Start to Quality · The Children's Center</p>
    </div>
    <div class="field"><label>Username</label><input type="text" id="loginUser" placeholder="username" autocomplete="username"></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">GSQ Self-Reflection<span>The Children's Center</span></div>
    <div class="loc-switcher" id="locSwitcher"></div>
    <div class="topbar-spacer"></div>
    <nav class="nav-tabs">
      <button class="nav-tab active" onclick="showView('dashboard',this)">📊 Dashboard</button>
      <button class="nav-tab" onclick="showView('reflection',this)">📋 Self-Reflection</button>
      <button class="nav-tab" onclick="showView('documents',this)">📁 Documents</button>
      <button class="nav-tab" onclick="showView('evidence',this)">📎 Evidence Tracker</button>
      <button class="nav-tab" onclick="showView('report',this)">📊 Readiness Report</button>
      <button class="nav-tab admin-only" onclick="showView('admin',this)" style="display:none">⚙️ Admin</button>
    </nav>
    <div class="user-pill" id="userPill">
      <span id="userLabel">–</span>
      <button onclick="showView('settings',document.querySelector('.nav-tab.active'))">🔑</button>
      <button onclick="doLogout()">↪ Logout</button>
    </div>
  </div>

  <div class="app-body">
    <aside class="sidebar" id="sidebar" style="display:none">
      <div id="sidebarContent"></div>
    </aside>
    <main class="main">
      <div class="view active" id="view-dashboard"><div class="dash" id="dashContent"></div></div>
      <div class="view" id="view-reflection">
        <div id="noSel" class="no-select-msg"><div class="ei">👈</div><p>Select a section from the sidebar</p></div>
        <div id="secEditorWrap" style="display:none"></div>
      </div>
      <div class="view" id="view-documents"><div id="docsContent"></div></div>
      <div class="view" id="view-evidence"><div id="evidenceContent"></div></div>
      <div class="view" id="view-report"><div id="reportContent" style="padding:1.5rem 2rem"></div></div>
      <div class="view admin-only" id="view-admin" style="display:none"><div id="adminContent"></div></div>
      <div class="view" id="view-settings"><div id="settingsContent"></div></div>
    </main>
  </div>
</div>

<div class="overlay" id="genericModal">
  <div class="modal">
    <div class="modal-hdr"><h3 id="modalTitle">Modal</h3><button class="modal-x" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let me = null; // { role, locationId }
let locations = [];
let framework = [];
let currentLocId = null;
let currentSectionId = null;
let progress = {};
let responsesCache = {}; // { locId: { sectionId: { itemId: response } } }
let documents = [];

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  btn.innerHTML = '<span class="spin"></span> Signing in…'; btn.disabled = true; err.textContent = '';
  try {
    const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:u,password:p}) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    me = { role: d.user.role, locationId: d.user.locationId, name: d.user.name };
    await initApp();
  } catch(e) { err.textContent = e.message; }
  btn.innerHTML = 'Sign In'; btn.disabled = false;
}

async function doLogout() {
  await fetch('/api/auth/logout', { method:'POST' });
  location.reload();
}

async function checkAuth() {
  const r = await fetch('/api/auth/me');
  const d = await r.json();
  return d;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function initApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Admin UI
  if (me.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  }
  document.getElementById('userLabel').textContent = me.name || me.role;

  const [locsRes, fwRes] = await Promise.all([fetch('/api/locations'), fetch('/api/framework')]);
  locations = await locsRes.json();
  framework = await fwRes.json();

  // Set initial location
  if (me.role === 'admin') {
    currentLocId = locations[0]?._id || null;
  } else {
    currentLocId = me.locationId;
  }

  renderLocSwitcher();
  await loadProgress();
  renderDashboard();
  renderSidebar();
  renderDocsView();
  if (me.role === 'admin') renderAdminView();
  renderSettingsView();
}

// ═══════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  document.getElementById('sidebar').style.display = name === 'reflection' ? 'flex' : 'none';
  if (name === 'dashboard') renderDashboard();
  if (name === 'documents') renderDocsView();
  if (name === 'evidence') renderEvidenceTracker();
  if (name === 'report') renderReadinessReport();
  if (name === 'admin' && me.role === 'admin') renderAdminView();
}

// ═══════════════════════════════════════════
// LOCATION SWITCHER
// ═══════════════════════════════════════════
function renderLocSwitcher() {
  if (me.role !== 'admin') return;
  const sw = document.getElementById('locSwitcher');
  sw.innerHTML = locations.map(l =>
    `<button class="loc-btn ${l._id === currentLocId ? 'active' : ''}" onclick="switchLoc('${l._id}')">${l.name}</button>`
  ).join('');
}

async function switchLoc(id) {
  currentLocId = id;
  renderLocSwitcher();
  currentSectionId = null;
  document.getElementById('noSel').style.display = 'flex';
  document.getElementById('secEditorWrap').style.display = 'none';
  await loadProgress();
  renderSidebar();
  renderDashboard();
}

// ═══════════════════════════════════════════
// PROGRESS + SIDEBAR
// ═══════════════════════════════════════════
async function loadProgress() {
  const url = currentLocId ? `/api/progress?locationId=${currentLocId}` : '/api/progress';
  const r = await fetch(url);
  const data = await r.json();
  progress = {};
  data.forEach(p => { progress[p.id] = p; });
}

function renderSidebar() {
  const locName = locations.find(l => l._id === currentLocId)?.name || '';
  let html = `<div class="sidebar-section"><div class="sidebar-section-title">${locName || 'All Locations'}</div>`;
  framework.forEach(sec => {
    const p = progress[sec.id] || { completed: 0, totalItems: sec.items.length };
    const pct = p.totalItems ? Math.round(p.completed / p.totalItems * 100) : 0;
    html += `<div class="sidebar-item ${sec.id === currentSectionId ? 'active' : ''}" onclick="selectSection('${sec.id}')">
      <div class="sidebar-item-name">${sec.name}</div>
      <div class="sidebar-prog">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <span class="prog-text">${p.completed}/${p.totalItems}</span>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('sidebarContent').innerHTML = html;
}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard() {
  const locName = me.role === 'admin'
    ? (locations.find(l => l._id === currentLocId)?.name || 'All')
    : (me.name || 'Your Center');
  const totalItems = framework.reduce((a, s) => a + s.items.length, 0);
  const totalDone = Object.values(progress).reduce((a, p) => a + p.completed, 0);
  const pct = totalItems ? Math.round(totalDone / totalItems * 100) : 0;
  const docCount = documents.length;

  let html = `<h2>Self-Reflection Dashboard</h2>
    <p class="dash-sub">${locName} · Great Start to Quality Progress Tracker</p>
    <div class="stats">
      <div class="stat"><div class="val">${pct}%</div><div class="lbl">Overall Complete</div></div>
      <div class="stat"><div class="val">${totalDone}/${totalItems}</div><div class="lbl">Items with Responses</div></div>
      <div class="stat"><div class="val">${framework.length}</div><div class="lbl">Sections</div></div>
      <div class="stat"><div class="val">${documents.length}</div><div class="lbl">Docs Indexed</div></div>
    </div>
    <div class="section-grid">`;

  framework.forEach(sec => {
    const p = progress[sec.id] || { completed: 0, totalItems: sec.items.length };
    const p2 = p.totalItems ? Math.round(p.completed / p.totalItems * 100) : 0;
    html += `<div class="sec-card" onclick="goToSection('${sec.id}')">
      <h3>${sec.name}</h3>
      <div class="bar"><div class="bar-fill" style="width:${p2}%"></div></div>
      <div class="pct">${p.completed} of ${p.totalItems} items · ${p2}%</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('dashContent').innerHTML = html;
}

function goToSection(id) {
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[1].classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-reflection').classList.add('active');
  document.getElementById('sidebar').style.display = 'flex';
  selectSection(id);
}

// ═══════════════════════════════════════════
// SECTION + ITEMS
// ═══════════════════════════════════════════
async function selectSection(id) {
  currentSectionId = id;
  renderSidebar();
  document.getElementById('noSel').style.display = 'none';
  document.getElementById('secEditorWrap').style.display = 'block';
  await renderSectionEditor();
}

async function renderSectionEditor() {
  const sec = framework.find(s => s.id === currentSectionId);
  if (!sec) return;
  const locId = currentLocId || me.locationId || null;
  const url = `/api/responses/${sec.id}${locId ? '?locationId=' + locId : ''}`;
  const r = await fetch(url);
  const responses = await r.json();
  if (!responsesCache[locId]) responsesCache[locId] = {};
  if (!responsesCache[locId][sec.id]) responsesCache[locId][sec.id] = {};
  responses.forEach(resp => { responsesCache[locId][sec.id][resp.itemId] = resp; });

  let html = `<div class="sec-editor">
    <div class="sec-editor-hdr">
      <div><h2>${sec.name}</h2><p>${sec.description}</p></div>
    </div>`;
  sec.items.forEach((item, i) => {
    const resp = responsesCache[locId]?.[sec.id]?.[item.id] || {};
    html += renderItemCard(item, i + 1, resp);
  });
  html += '</div>';
  document.getElementById('secEditorWrap').innerHTML = html;
}

function renderItemCard(item, num, resp) {
  const isDone = resp.narrative && resp.narrative.trim();
  const policyCount = (resp.policyMatches || []).filter(m => m.status === 'accepted').length;
  const evidenceLabel = resp.evidenceCount > 0 ? resp.evidenceCount : '';
  let numClass = isDone ? 'done' : policyCount ? 'partial' : '';
  let badges = '';
  if (isDone) badges += `<span class="badge green">✅ Response saved</span>`;
  if (policyCount) badges += `<span class="badge gold">📄 ${policyCount} policy ref${policyCount > 1 ? 's' : ''}</span>`;
  if (resp.rating) {
    const labels = ['','Not yet','Beginning','Developing','Established','Exemplary'];
    badges += `<span class="badge">⭐ ${labels[resp.rating]}</span>`;
  }
  if (item.note) badges += `<span class="badge" style="background:#f0f4ff;border-color:#c5d0f0;color:#3d5080">ℹ️ ${item.note.length > 60 ? item.note.slice(0, 60) + '…' : item.note}</span>`;
  return `<div class="item-card" id="ic-${item.id}">
    <div class="item-hdr" id="ih-${item.id}" onclick="toggleItem('${item.id}', this)">
      <div class="item-num ${numClass}">${num}</div>
      <div class="item-info">
        <div class="item-title">${item.title}</div>
        <div class="item-sub">${item.fullText}</div>
        <div class="item-badges" id="ib-${item.id}">${badges}</div>
      </div>
      <span class="expand-icon">▾</span>
    </div>
    <div class="item-body" id="ibody-${item.id}">
      <div class="item-tabs">
        <button class="itab active" onclick="switchTab('${item.id}','narr',this)">📝 My Response</button>
        <button class="itab" onclick="switchTab('${item.id}','policy',this)">📄 Policy Evidence</button>
        <button class="itab" onclick="switchTab('${item.id}','files',this)">🗂️ File Evidence</button>
      </div>
      <div class="tab-body active" id="tab-${item.id}-narr">${renderNarr(item, resp)}</div>
      <div class="tab-body" id="tab-${item.id}-policy">${renderPolicy(item, resp)}</div>
      <div class="tab-body" id="tab-${item.id}-files">${renderFilesTab(item)}</div>
    </div>
  </div>`;
}

// ─── NARRATIVE TAB ───────────────────────────────────────────────────────────
function renderNarr(item, resp) {
  let html = '';
  if (item.note) html += `<div class="note-box">ℹ️ ${item.note}</div>`;
  html += `<div class="criteria-box"><strong>What Evaluators Are Looking For:</strong><ul class="criteria-list">`;
  (item.checklistItems || []).forEach(c => { html += `<li>${c}</li>`; });
  html += `</ul></div>`;
  html += `<textarea class="narr" id="narr-${item.id}" placeholder="Write your self-reflection response here. Be specific — describe what your program does, how it does it, and reference the evidence you have…">${resp.narrative || ''}</textarea>`;
  const rlabels = ['Not yet in place','Beginning','Developing','Established','Exemplary'];
  html += `<div class="rating-row">`;
  [1,2,3,4,5].forEach(v => {
    html += `<button class="rbn ${resp.rating==v?'sel':''}" data-v="${v}" onclick="setRating('${item.id}',${v},this)">${v} – ${rlabels[v-1]}</button>`;
  });
  html += `</div><div class="save-row">
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('narr-${item.id}').value=''">Clear</button>
    <button class="btn btn-navy btn-sm" id="savebtn-${item.id}" onclick="saveNarr('${item.id}')">💾 Save Response</button>
  </div>`;
  return html;
}

async function saveNarr(itemId) {
  const narrative = document.getElementById('narr-' + itemId).value;
  const locId = currentLocId || me.locationId;
  const sec = framework.find(s => s.items.some(i => i.id === itemId));
  const resp = responsesCache[locId]?.[sec.id]?.[itemId] || {};
  const btn = document.getElementById('savebtn-' + itemId);
  btn.innerHTML = '<span class="spin"></span>';
  try {
    await fetch('/api/responses', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sectionId: sec.id, itemId, narrative, policyMatches: resp.policyMatches || [], rating: resp.rating, locationId: locId }) });
    if (!responsesCache[locId]) responsesCache[locId] = {};
    if (!responsesCache[locId][sec.id]) responsesCache[locId][sec.id] = {};
    responsesCache[locId][sec.id][itemId] = { ...resp, narrative };
    toast('Saved ✓', 'ok');
    refreshItemBadges(itemId, sec.id, locId);
    await loadProgress(); renderSidebar(); renderDashboard();
  } catch(e) { toast('Save failed', 'err'); }
  btn.innerHTML = '💾 Save Response';
}

function setRating(itemId, val, btn) {
  btn.closest('.rating-row').querySelectorAll('.rbn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  const locId = currentLocId || me.locationId;
  const sec = framework.find(s => s.items.some(i => i.id === itemId));
  if (!responsesCache[locId]) responsesCache[locId] = {};
  if (!responsesCache[locId][sec.id]) responsesCache[locId][sec.id] = {};
  const resp = responsesCache[locId][sec.id][itemId] || {};
  responsesCache[locId][sec.id][itemId] = { ...resp, rating: val };
  const narrative = document.getElementById('narr-' + itemId)?.value || resp.narrative || '';
  fetch('/api/responses', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sectionId: sec.id, itemId, narrative, policyMatches: resp.policyMatches || [], rating: val, locationId: locId }) });
}

// ─── POLICY TAB ──────────────────────────────────────────────────────────────
function renderPolicy(item, resp) {
  const matches = resp.policyMatches || [];
  const accepted = matches.filter(m => m.status === 'accepted');
  const pending = matches.filter(m => !m.status || m.status === 'pending');
  const dismissed = matches.filter(m => m.status === 'dismissed');

  let html = `<div class="policy-search">
    <input type="text" id="pq-${item.id}" placeholder="Search your handbooks & policies (e.g. 'supervision policy', 'conference')…" onkeydown="if(event.key==='Enter')searchPolicy('${item.id}')">
    <button class="btn btn-outline btn-sm" onclick="searchPolicy('${item.id}')" id="psrch-${item.id}">🔍 Search</button>
    <button class="btn btn-gold btn-sm" onclick="autoPolicy('${item.id}')" id="pauto-${item.id}">✨ Auto-Find</button>
  </div><div id="pr-${item.id}">`;

  if (!matches.length) {
    html += `<div class="empty"><div class="ei">📄</div><p>No policy matches yet.<br>Click <strong>✨ Auto-Find</strong> to search your uploaded documents,<br>or type a search term above.</p></div>`;
  } else {
    if (accepted.length) {
      html += `<div class="matches-section-hdr green">✅ Accepted (${accepted.length})</div>`;
      accepted.forEach(m => { html += renderMatchCard(item.id, m, matches.indexOf(m)); });
    }
    if (pending.length) {
      html += `<div class="matches-section-hdr muted">📋 Suggested — Review These (${pending.length})</div>`;
      pending.forEach(m => { html += renderMatchCard(item.id, m, matches.indexOf(m)); });
    }
    if (dismissed.length) {
      html += `<details style="margin-top:10px"><summary style="font-size:.78rem;color:var(--muted);cursor:pointer">Dismissed (${dismissed.length})</summary>`;
      dismissed.forEach(m => { html += renderMatchCard(item.id, m, matches.indexOf(m)); });
      html += `</details>`;
    }
  }
  html += '</div>';
  return html;
}

function renderMatchCard(itemId, m, idx) {
  const typeLabel = {staff_handbook:'Staff Handbook',family_handbook:'Family Handbook',policy:'Policy Doc',other:'Document'}[m.docType] || 'Document';
  let actions = '';
  if (m.status === 'accepted') {
    actions = `<span class="badge green" style="font-size:.72rem">✓ In Use</span>
      <button class="btn btn-outline btn-xs" onclick="setMatchStatus('${itemId}',${idx},'dismissed')">Remove</button>`;
  } else if (m.status === 'dismissed') {
    actions = `<button class="btn btn-outline btn-xs" onclick="setMatchStatus('${itemId}',${idx},'pending')">↩ Restore</button>`;
  } else {
    actions = `<button class="btn btn-green btn-xs" onclick="setMatchStatus('${itemId}',${idx},'accepted')">✓ Use This</button>
      <button class="btn btn-red btn-xs" onclick="setMatchStatus('${itemId}',${idx},'dismissed')">✕ Dismiss</button>`;
  }
  return `<div class="match-card ${m.status || ''}">
    <div class="match-top">
      <span class="match-src">📖 ${m.docName} <span style="font-weight:400;opacity:.7">(${typeLabel})</span></span>
      <span class="match-pg">Page ${m.page}</span>
    </div>
    <div class="match-excerpt">${m.excerpt}</div>
    <div class="match-why">💡 ${m.relevance}</div>
    <div class="match-actions">${actions}</div>
  </div>`;
}

async function autoPolicy(itemId) {
  await runPolicySearch(itemId, null);
}
async function searchPolicy(itemId) {
  const q = document.getElementById('pq-' + itemId).value.trim();
  await runPolicySearch(itemId, q);
}

async function runPolicySearch(itemId, searchQuery) {
  const btnId = searchQuery ? 'psrch-' + itemId : 'pauto-' + itemId;
  const btn = document.getElementById(btnId);
  const orig = btn.innerHTML; btn.innerHTML = '<span class="spin dark"></span>'; btn.disabled = true;

  const sec = framework.find(s => s.items.some(i => i.id === itemId));
  const item = sec.items.find(i => i.id === itemId);
  const locId = currentLocId || me.locationId;

  try {
    const r = await fetch('/api/ai/search-policies', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ itemText: item.title + ': ' + item.fullText, criteria: item.fullText, checklistItems: item.checklistItems, searchQuery, locationId: locId || currentLocId || null }) });
    const data = await r.json();
    if (data.message) { toast(data.message); btn.innerHTML = orig; btn.disabled = false; return; }

    const resp = responsesCache[locId]?.[sec.id]?.[itemId] || {};
    const existing = resp.policyMatches || [];
    const newM = (data.matches || []).map(m => ({ ...m, status: 'pending' }));
    const merged = [...existing];
    newM.forEach(nm => {
      const dup = merged.find(e => e.docName === nm.docName && e.page === nm.page);
      if (!dup) merged.push(nm);
    });

    if (!responsesCache[locId]) responsesCache[locId] = {};
    if (!responsesCache[locId][sec.id]) responsesCache[locId][sec.id] = {};
    responsesCache[locId][sec.id][itemId] = { ...resp, policyMatches: merged };

    const narrative = document.getElementById('narr-' + itemId)?.value || resp.narrative || '';
    await fetch('/api/responses', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sectionId: sec.id, itemId, narrative, policyMatches: merged, rating: resp.rating, locationId: locId }) });

    document.getElementById('tab-' + itemId + '-policy').innerHTML = renderPolicy(item, { ...resp, policyMatches: merged });
    toast(`Found ${newM.length} match${newM.length !== 1 ? 'es' : ''}`, newM.length ? 'ok' : '');
  } catch(e) { toast('Search failed: ' + e.message, 'err'); }
  btn.innerHTML = orig; btn.disabled = false;
}

async function setMatchStatus(itemId, idx, status) {
  const sec = framework.find(s => s.items.some(i => i.id === itemId));
  const item = sec.items.find(i => i.id === itemId);
  const locId = currentLocId || me.locationId;
  const resp = responsesCache[locId]?.[sec.id]?.[itemId] || {};
  const matches = [...(resp.policyMatches || [])];
  if (matches[idx]) matches[idx] = { ...matches[idx], status };
  responsesCache[locId][sec.id][itemId] = { ...resp, policyMatches: matches };
  const narrative = document.getElementById('narr-' + itemId)?.value || resp.narrative || '';
  await fetch('/api/responses', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sectionId: sec.id, itemId, narrative, policyMatches: matches, rating: resp.rating, locationId: locId }) });
  document.getElementById('tab-' + itemId + '-policy').innerHTML = renderPolicy(item, { ...resp, policyMatches: matches });
  refreshItemBadges(itemId, sec.id, locId);
}

async function loadEvidence(itemId) {
  const sec = framework.find(s => s.items.some(i => i.id === itemId));
  const locId = currentLocId || me.locationId;
  const url = `/api/evidence/${sec.id}/${itemId}?locationId=${locId || ''}`;
  const r = await fetch(url);
  const ev = await r.json();
  const c = document.getElementById('evlist-' + itemId);
  if (!c) return;
  if (!ev.length) { c.innerHTML = '<p style="font-size:.85rem;color:var(--muted)">No files attached yet.</p>'; return; }
  c.innerHTML = '<div class="ev-list">' + ev.map(e => {
    const icon = e.mimetype?.includes('image') ? '🖼️' : e.mimetype?.includes('pdf') ? '📕' : '📄';
    return `<div class="ev-item">

    </div>`;

async function uploadEv(itemId, input) {
  const sec = framework.find(s => s.items.some(i => i.id === itemId));
  const locId = currentLocId || me.locationId;
  for (const file of input.files) {
    const fd = new FormData();
    fd.append('file', file); fd.append('sectionId', sec.id); fd.append('itemId', itemId);
    fd.append('label', file.name); if (locId) fd.append('locationId', locId);
    await fetch('/api/evidence/upload', { method:'POST', body: fd });
  }
  toast('File(s) attached ✓', 'ok');
  loadEvidence(itemId);
  input.value = '';
}

async function deleteEv(id, itemId) {

}

function toggleItem(itemId, hdr) {

  body.style.display = open ? 'none' : 'block';

function switchTab(itemId, tab, btn) {
  document.querySelectorAll(`[id^="tab-${itemId}-"]`).forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${itemId}-${tab}`).classList.add('active');
  btn.closest('.item-tabs').querySelectorAll('.itab').forEach(b => b.classList.remove('active'));

function refreshItemBadges(itemId, secId, locId) {
  const resp = responsesCache[locId]?.[secId]?.[itemId] || {};
  const isDone = resp.narrative && resp.narrative.trim();
  const policyCount = (resp.policyMatches || []).filter(m => m.status === 'accepted').length;
  const numEl = document.querySelector(`#ic-${itemId} .item-num`);
  if (numEl) numEl.className = `item-num ${isDone ? 'done' : policyCount ? 'partial' : ''}`;
  const rlabels = ['','Not yet','Beginning','Developing','Established','Exemplary'];
  const badgeEl = document.getElementById('ib-' + itemId);
  if (badgeEl) badgeEl.innerHTML = `
    ${isDone ? '<span class="badge green">✅ Response saved</span>' : ''}
    ${policyCount ? `<span class="badge gold">📄 ${policyCount} policy ref${policyCount>1?'s':''}</span>` : ''}
    ${resp.rating ? `<span class="badge">⭐ ${rlabels[resp.rating]}</span>` : ''}`;
}

async function renderDocsView() {
  // Always fetch ALL documents when admin so we can group by location

  const allDocs = await r.json();
  documents = allDocs; // keep global updated

  let scopeOptions = `<option value="shared">🌐 All locations (shared)</option>`;
  locations.forEach(l => { scopeOptions += `<option value="${l._id}">${l.name} only</option>`; });

    <h2>Handbooks & Policy Documents</h2>
    <p style="color:var(--muted);margin-bottom:20px">

    </div>

      </div>
      <div class="form-row">
        <div class="fg">
          <label>Belongs To</label>
          <select id="docScope">${scopeOptions}</select>
          <span style="font-size:.75rem;color:var(--muted);margin-top:3px;display:block">Choose which center(s) this document applies to</span>

      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">

        <button class="btn btn-navy" id="uploadDocBtn" onclick="confirmDoc()">📤 Upload & Index Document</button>
      </div>
    </div>`;

  // Group documents: shared first, then by location
  const sharedDocs = allDocs.filter(d => d.shared);
  const groups = [
    { label: '🌐 Shared — Available to All Locations', docs: sharedDocs, key: 'shared' },
    ...locations.map(l => ({
      label: `🏫 ${l.name} Only`,
      docs: allDocs.filter(d => !d.shared && d.locationId === l._id),
      key: l._id,
      locId: l._id
    }))
  ];

  groups.forEach(group => {
    if (!group.docs.length) return;
    html += `<div style="margin-bottom:22px">
      <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:10px">${group.label}</div>
      <div class="doc-list">`;
    group.docs.forEach(d => {
      const scopeLabel = d.shared ? '<span class="doc-badge shared">🌐 Shared</span>'
        : `<span class="doc-badge">${typeLabel[d.docType] || 'Document'}</span>`;
      html += `<div class="doc-item">
        <span style="font-size:1.4rem">${d.mimetype?.includes('pdf') ? '📕' : '📘'}</span>
        <div style="flex:1">
          <div class="doc-name">${d.docName}</div>
          <div class="doc-meta">${typeLabel[d.docType] || 'Document'} · ${d.pageCount || 0} pages indexed · ${new Date(d.createdAt).toLocaleDateString()}</div>
        </div>
        ${scopeLabel}
        <span style="font-size:.75rem;padding:3px 8px;border-radius:20px;background:${(d.pageCount||0) > 0 ? 'var(--green-bg)' : 'var(--red-bg)'};color:${(d.pageCount||0) > 0 ? 'var(--green)' : 'var(--red)'};">${(d.pageCount||0) > 0 ? d.pageCount + ' pages ✓' : '⚠️ 0 pages — needs re-index'}</span>
        <button class="btn btn-outline btn-sm" onclick="reindexDoc('${d._id}','${d.docName.replace(/'/g,"\'")}',event)" title="Re-process document text extraction">🔄 Re-index</button>

  });

  if (!allDocs.length) {
    html += `<div class="empty"><div class="ei">📚</div><p>No documents uploaded yet.<br>Upload your first handbook or policy document above.</p></div>`;

  // drag-drop
  const dz = document.getElementById('dropZone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag'));

      e.preventDefault(); dz.classList.remove('drag');
      const f = e.dataTransfer.files[0];
      if (f) { _pendingDocFile = f; document.getElementById('dn').value = f.name.replace(/\.[^/.]+$/,''); document.getElementById('docForm').classList.add('show'); }
    });
  }
}

let _pendingDocFile = null;
function handleDocSelect(e) {
  _pendingDocFile = e.target.files[0];
  if (!_pendingDocFile) return;
  document.getElementById('dn').value = _pendingDocFile.name.replace(/\.[^/.]+$/,'');
  document.getElementById('docForm').classList.add('show');
}
function cancelDoc() {
  _pendingDocFile = null;
  document.getElementById('docFile').value = '';
  document.getElementById('docForm').classList.remove('show');
}
async function confirmDoc() {
  if (!_pendingDocFile) return;
  const btn = document.getElementById('uploadDocBtn');
  btn.innerHTML = '<span class="spin"></span> Indexing…'; btn.disabled = true;
  const scope = document.getElementById('docScope').value;
  const fd = new FormData();
  fd.append('file', _pendingDocFile);
  fd.append('docName', document.getElementById('dn').value.trim() || _pendingDocFile.name);
  fd.append('docType', document.getElementById('dt').value);
  fd.append('shared', scope === 'shared' ? 'true' : 'false');
  if (scope !== 'shared') fd.append('locationId', scope);
  try {
    const r = await fetch('/api/documents/upload', { method:'POST', body: fd });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    const scopeName = scope === 'shared' ? 'all locations' : locations.find(l => l._id === scope)?.name || scope;
    toast(`Indexed: ${d.pageCount} pages · assigned to ${scopeName} ✓`, 'ok');
    cancelDoc();
    renderDocsView();
  } catch(e) { toast('Upload failed: ' + e.message, 'err'); }
  btn.innerHTML = '📤 Upload & Index Document'; btn.disabled = false;
}
async function reindexDoc(id, name, event) {
  const btn = event.target;
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spin dark"></span>'; btn.disabled = true;
  try {
    const r = await fetch(`/api/documents/${id}/reindex`, { method: 'POST' });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    toast(`Re-indexed "${name}": ${d.pageCount} pages found ✓`, 'ok');
    renderDocsView();
  } catch(e) { toast('Re-index failed: ' + e.message, 'err'); btn.innerHTML = orig; btn.disabled = false; }
}

async function deleteDoc(id) {
  if (!confirm('Remove this document? This cannot be undone.')) return;
  await fetch('/api/documents/' + id, { method:'DELETE' });
  toast('Document removed');
  renderDocsView();
}

// Identify which evidence items from the framework need PHYSICAL evidence (not just policy docs)
function getPhysicalEvidenceItems() {
  const physicalKeywords = [
    'completed', 'photo', 'picture', 'copy of', 'training record', 'certificate',
    'screenshot', 'form', 'meeting minutes', 'agenda', 'membership', 'roster',
    'lesson plan', 'score page', 'results page', 'anecdotal', 'survey', 'enrollment',
    'conference form', 'written communication', 'feedback', 'schedule'
  ];
  const policyOnly = ['policy','procedure','statement','description','handbook','contract'];

  const items = [];
  framework.forEach(section => {
    section.items.forEach(item => {
      if (!item.evidenceExamples) return;
      const physEvidence = item.evidenceExamples.filter(ex => {
        const lower = ex.toLowerCase();
        const hasPhysical = physicalKeywords.some(k => lower.includes(k));
        const isPolicyOnly = policyOnly.every(k => lower.includes(k)) && !hasPhysical;
        return hasPhysical && !isPolicyOnly;
      });
      if (physEvidence.length > 0) {
        items.push({ section, item, physEvidence });
      }
    });
  });
  return items;
}

async function renderEvidenceTracker() {
  const locId = currentLocId || (me.role !== 'admin' ? me.locationId : null);
  const wrap = document.getElementById('evidenceContent');
  wrap.innerHTML = '<div style="padding:2rem;text-align:center"><span class="spin dark"></span></div>';

  // Load tracker items for this location
  const url = locId ? `/api/tracker?locationId=${locId}` : '/api/tracker';
  const r = await fetch(url);
  const trackerItems = await r.json();
  const trackerMap = {}; // key: `${itemId}||${evidenceLabel}` → tracker record
  trackerItems.forEach(t => { trackerMap[`${t.itemId}||${t.evidenceLabel}`] = t; });

  const physItems = getPhysicalEvidenceItems();

  // Count stats
  const total = physItems.reduce((n, p) => n + p.physEvidence.length, 0);
  const uploaded = trackerItems.filter(t => t.status === 'uploaded').length;
  const todo = trackerItems.filter(t => t.status === 'todo').length;
  const done = trackerItems.filter(t => t.status === 'done').length;

  let html = `
<div style="padding:1.5rem 2rem 0">
  <h2 style="color:var(--navy);margin:0 0 .25rem">📎 Evidence Tracker</h2>
  <p style="color:var(--muted);margin:0 0 1.25rem">Physical evidence required beyond policy documents — upload files or mark items for your to-gather list.</p>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem">
    <div class="stat-card" style="flex:1;min-width:120px"><div class="stat-num">${total}</div><div class="stat-label">Items Needed</div></div>
    <div class="stat-card" style="flex:1;min-width:120px;border-color:var(--green)"><div class="stat-num" style="color:var(--green)">${uploaded + done}</div><div class="stat-label">Complete</div></div>
    <div class="stat-card" style="flex:1;min-width:120px;border-color:#f59e0b"><div class="stat-num" style="color:#f59e0b">${todo}</div><div class="stat-label">On To-Do List</div></div>
    <div class="stat-card" style="flex:1;min-width:120px;border-color:var(--red)"><div class="stat-num" style="color:var(--red)">${total - uploaded - done - todo}</div><div class="stat-label">Not Started</div></div>
  </div>`;

  // Filter bar
  html += `
  <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center">
    <span style="font-size:.82rem;color:var(--muted);font-weight:600">FILTER:</span>
    <button class="btn btn-sm btn-outline etfilter active" data-filter="all" onclick="filterEvidence(this,'all')">All</button>
    <button class="btn btn-sm btn-outline etfilter" data-filter="not-started" onclick="filterEvidence(this,'not-started')">Not Started</button>
    <button class="btn btn-sm btn-outline etfilter" data-filter="todo" onclick="filterEvidence(this,'todo')">📋 To-Do List</button>
    <button class="btn btn-sm btn-outline etfilter" data-filter="uploaded" onclick="filterEvidence(this,'uploaded')">✅ Uploaded</button>
  </div>`;

  // Section groups
  physItems.forEach(({ section, item, physEvidence }) => {
    html += `<div class="et-section" data-section="${section.id}">
      <div class="et-section-hdr">${section.name}</div>`;

    physEvidence.forEach((evLabel, idx) => {
      const key = `${item.id}||${evLabel}`;
      const tracked = trackerMap[key];
      const status = tracked ? tracked.status : 'not-started';
      const statusColors = { 'uploaded':'var(--green)', 'done':'var(--green)', 'todo':'#f59e0b', 'not-started':'var(--muted)' };
      const statusIcons = { 'uploaded':'✅', 'done':'✅', 'todo':'📋', 'not-started':'○' };
      const encodedLabel = encodeURIComponent(evLabel);

      html += `<div class="et-item" data-status="${status}" data-key="${key}">
        <div class="et-item-top">
          <div class="et-item-info">
            <span class="et-indicator-badge">${item.id}</span>
            <div>
              <div class="et-item-title">${evLabel}</div>
              <div class="et-item-sub">${item.title.replace(/^[A-Z0-9]+ – /,'')}</div>
            </div>
          </div>
          <div class="et-item-actions">
            <span class="et-status-dot" style="color:${statusColors[status]};font-size:.8rem;font-weight:700">${statusIcons[status]} ${status === 'not-started' ? 'Not started' : status === 'todo' ? 'On to-do list' : status === 'uploaded' ? 'Uploaded' : 'Done'}</span>
            ${tracked && tracked.filename
              ? `<a href="/uploads/${tracked.filename}" target="_blank" class="btn btn-sm btn-outline" title="View uploaded file">👁 View</a>`
              : ''}
            <button class="btn btn-sm btn-gold" onclick="uploadTrackerFile('${item.id}','${section.id}','${encodedLabel}','${locId||''}',this)">⬆️ Upload</button>
            ${status !== 'todo'
              ? `<button class="btn btn-sm btn-outline" onclick="markTrackerTodo('${item.id}','${section.id}','${encodedLabel}','${locId||''}',this)" title="Add to to-do list">📋 To-Do</button>`
              : `<button class="btn btn-sm btn-outline" style="color:var(--red)" onclick="removeTrackerItem('${tracked._id}',this)" title="Remove from to-do list">✕ Remove</button>`}
            ${tracked ? `<button class="btn btn-sm btn-outline" style="color:var(--red)" onclick="deleteTrackerItem('${tracked._id}',this)">🗑</button>` : ''}
          </div>
        </div>
        ${tracked && tracked.notes ? `<div class="et-notes">${tracked.notes}</div>` : ''}
      </div>`;
    });

    html += `</div>`;
  });

  // To-do list summary at bottom
  const todoList = trackerItems.filter(t => t.status === 'todo');
  if (todoList.length > 0) {
    html += `
    <div style="margin-top:2rem;padding:1.25rem;background:var(--cream2);border-radius:12px;border:1.5px solid #f59e0b">
      <h3 style="margin:0 0 1rem;color:#92400e;font-size:1rem">📋 Your To-Gather List (${todoList.length} items)</h3>
      <p style="font-size:.82rem;color:var(--muted);margin:0 0 .75rem">These items still need to be gathered and uploaded.</p>`;
    todoList.forEach(t => {
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem .75rem;background:white;border-radius:8px;margin-bottom:.5rem;font-size:.85rem">
        <span><strong style="color:var(--navy)">${t.itemId}</strong> — ${t.evidenceLabel}</span>
        <button class="btn btn-sm btn-gold" onclick="uploadTrackerFile('${t.itemId}','${t.sectionId}','${encodeURIComponent(t.evidenceLabel)}','${locId||''}',this)">⬆️ Upload</button>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  wrap.innerHTML = html;
}

function filterEvidence(btn, filter) {
  document.querySelectorAll('.etfilter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.et-item').forEach(el => {
    if (filter === 'all') el.style.display = '';
    else el.style.display = el.dataset.status === filter ? '' : 'none';
  });
  document.querySelectorAll('.et-section').forEach(sec => {
    const visible = [...sec.querySelectorAll('.et-item')].some(el => el.style.display !== 'none');
    sec.style.display = visible ? '' : 'none';
  });
}

async function markTrackerTodo(itemId, sectionId, encodedLabel, locId, btn) {
  const orig = btn.innerHTML; btn.innerHTML = '<span class="spin dark"></span>'; btn.disabled = true;
  const evidenceLabel = decodeURIComponent(encodedLabel);
  try {
    await fetch('/api/tracker', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ itemId, sectionId, evidenceLabel, locationId: locId || currentLocId || me.locationId, status: 'todo' }) });
    toast('Added to to-do list 📋', 'ok');
    renderEvidenceTracker();
  } catch(e) { toast('Error: ' + e.message, 'err'); btn.innerHTML = orig; btn.disabled = false; }
}

function uploadTrackerFile(itemId, sectionId, encodedLabel, locId, btn) {
  const evidenceLabel = decodeURIComponent(encodedLabel);
  const modalBody = document.getElementById('modalBody');
  const modalFoot = document.getElementById('modalFoot');
  document.getElementById('modalTitle').textContent = 'Upload Evidence';
  modalBody.innerHTML = `
    <p style="margin:0 0 1rem;font-size:.88rem;color:var(--muted)"><strong>${itemId}:</strong> ${evidenceLabel}</p>
    <div class="form-row">
      <label>Select File</label>
      <input type="file" id="trackerFileInput" style="font-size:.88rem">
    </div>
    <div class="form-row">
      <label>Notes (optional)</label>
      <input type="text" id="trackerNotes" placeholder="e.g. Spring 2025 assessment results" style="width:100%;padding:.5rem;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem">
    </div>`;
  modalFoot.innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" id="trackerUploadBtn" onclick="submitTrackerUpload('${itemId}','${sectionId}','${encodedLabel}','${locId}')">⬆️ Upload</button>`;
  document.getElementById('genericModal').classList.add('active');
}

async function submitTrackerUpload(itemId, sectionId, encodedLabel, locId) {
  const fileInput = document.getElementById('trackerFileInput');
  const notes = document.getElementById('trackerNotes').value;
  const btn = document.getElementById('trackerUploadBtn');
  if (!fileInput.files[0]) { toast('Please select a file', 'err'); return; }
  btn.innerHTML = '<span class="spin"></span> Uploading…'; btn.disabled = true;
  const fd = new FormData();
  fd.append('file', fileInput.files[0]);
  fd.append('itemId', itemId);
  fd.append('sectionId', sectionId);
  fd.append('evidenceLabel', decodeURIComponent(encodedLabel));
  fd.append('locationId', locId || currentLocId || me.locationId || '');
  fd.append('notes', notes);
  try {
    const r = await fetch('/api/tracker/upload', { method:'POST', body: fd });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    closeModal();
    toast('Evidence uploaded ✅', 'ok');
    renderEvidenceTracker();
  } catch(e) { toast('Upload failed: ' + e.message, 'err'); btn.innerHTML = '⬆️ Upload'; btn.disabled = false; }
}

async function deleteTrackerItem(id, btn) {
  if (!confirm('Remove this evidence item?')) return;
  await fetch('/api/tracker/' + id, { method:'DELETE' });
  toast('Removed');
  renderEvidenceTracker();
}

async function removeTrackerItem(id, btn) {
  await fetch('/api/tracker/' + id, { method:'DELETE' });
  toast('Removed from to-do list');
  renderEvidenceTracker();
}

// ═══════════════════════════════════════════
// READINESS REPORT
// ═══════════════════════════════════════════
async function renderReadinessReport() {
  const wrap = document.getElementById('reportContent');
  wrap.innerHTML = '<div style="padding:2rem;text-align:center"><span class="spin dark"></span> Building report…</div>';

  const locId = currentLocId || (me.role !== 'admin' ? me.locationId : null);
  const locName = me.role === 'admin'
    ? (locations.find(l => l._id === locId)?.name || 'All Locations')
    : (me.name || 'Your Center');

  // Load all responses for this location
  const allResponses = {};
  await Promise.all(framework.map(async sec => {
    const url = `/api/responses/${sec.id}${locId ? '?locationId=' + locId : ''}`;
    const r = await fetch(url);
    const data = await r.json();
    data.forEach(resp => {
      if (!allResponses[sec.id]) allResponses[sec.id] = {};
      allResponses[sec.id][resp.itemId] = resp;
    });
  }));

  // Load tracker items (physical evidence)
  const trackerUrl = locId ? `/api/tracker?locationId=${locId}` : '/api/tracker';
  const trackerData = await (await fetch(trackerUrl)).json();
  const trackerMap = {};
  trackerData.forEach(t => {
    if (!trackerMap[t.itemId]) trackerMap[t.itemId] = {};
    trackerMap[t.itemId][t.evidenceLabel] = t;
  });

  // Helper: classify each evidence example as policy or physical
  const physicalKeywords = ['completed','photo','picture','copy of','training record','certificate','screenshot','form','meeting minutes','agenda','membership','roster','lesson plan','score page','results page','anecdotal','survey','enrollment','conference form','written communication','feedback','schedule'];
  function isPhysical(ex) {
    const lower = ex.toLowerCase();
    return physicalKeywords.some(k => lower.includes(k));
  }
  function isPolicyDoc(ex) {
    const lower = ex.toLowerCase();
    return (lower.includes('policy') || lower.includes('procedure') || lower.includes('statement') || lower.includes('description') || lower.includes('handbook')) && !isPhysical(ex);
  }

  // Tally overall stats
  let totalEvidence = 0, evidenceHave = 0, evidenceMissing = 0, evidenceTodo = 0;
  let itemsFull = 0, itemsPartial = 0, itemsNone = 0;

  // Build report data per item
  const reportSections = framework.map(sec => {
    const items = sec.items.map(item => {
      const resp = allResponses[sec.id]?.[item.id] || {};
      const acceptedPolicies = (resp.policyMatches || []).filter(m => m.status === 'accepted');
      const examples = item.evidenceExamples || [];

      const rows = examples.map(ex => {
        totalEvidence++;
        if (isPolicyDoc(ex)) {
          // Check if a policy match covers this
          const covered = acceptedPolicies.length > 0;
          if (covered) { evidenceHave++; return { type: 'policy', label: ex, status: 'have', source: acceptedPolicies[0].docName }; }
          else { evidenceMissing++; return { type: 'policy', label: ex, status: 'missing', source: null }; }
        } else if (isPhysical(ex)) {
          // Check tracker
          const trackerEntry = trackerMap[item.id]?.[ex];
          if (trackerEntry) {
            if (trackerEntry.status === 'uploaded' || trackerEntry.status === 'done') {
              evidenceHave++;
              return { type: 'physical', label: ex, status: 'have', source: trackerEntry.originalName || 'Uploaded file' };
            } else if (trackerEntry.status === 'todo') {
              evidenceTodo++;
              return { type: 'physical', label: ex, status: 'todo', source: 'On to-do list' };
            }
          }
          evidenceMissing++;
          return { type: 'physical', label: ex, status: 'missing', source: null };
        } else {
          // Mixed / AND clauses — check both
          const hasPolicyPart = acceptedPolicies.length > 0;
          const physLabel = ex.split('AND one supporting document:')[1]?.trim() || ex;
          const trackerEntry = trackerMap[item.id]?.[physLabel] || trackerMap[item.id]?.[ex];
          const hasPhysPart = trackerEntry && (trackerEntry.status === 'uploaded' || trackerEntry.status === 'done');
          const todoPhys = trackerEntry && trackerEntry.status === 'todo';

          if (hasPolicyPart && hasPhysPart) { evidenceHave++; return { type: 'both', label: ex, status: 'have', source: acceptedPolicies[0]?.docName }; }
          if (todoPhys || (hasPolicyPart && todoPhys)) { evidenceTodo++; return { type: 'both', label: ex, status: 'todo', source: hasPolicyPart ? 'Policy found; physical evidence on to-do list' : 'On to-do list' }; }
          evidenceMissing++;
          return { type: 'both', label: ex, status: 'missing', source: hasPolicyPart ? 'Policy found — still need supporting document' : null };
        }
      });

      const haveCount = rows.filter(r => r.status === 'have').length;
      const readiness = haveCount === rows.length ? 'full' : haveCount > 0 ? 'partial' : 'none';
      if (readiness === 'full') itemsFull++;
      else if (readiness === 'partial') itemsPartial++;
      else itemsNone++;

      return { item, resp, rows, readiness, haveCount, totalCount: rows.length };
    });
    return { sec, items };
  });

  // Build HTML
  const date = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
      <div>
        <h2 style="margin:0;color:var(--navy)">📊 GSQ Readiness Report</h2>
        <p style="margin:.25rem 0 0;color:var(--muted);font-size:.88rem">${locName} · Generated ${date}</p>
      </div>
      <button class="btn btn-outline rpt-print-btn" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>

    <div class="rpt-summary-bar">
      <div class="rpt-sum-card"><div class="rpt-sum-num" style="color:var(--green)">${itemsFull}</div><div class="rpt-sum-lbl">Fully Ready</div></div>
      <div class="rpt-sum-card"><div class="rpt-sum-num" style="color:#f59e0b">${itemsPartial}</div><div class="rpt-sum-lbl">Partially Ready</div></div>
      <div class="rpt-sum-card"><div class="rpt-sum-num" style="color:var(--red)">${itemsNone}</div><div class="rpt-sum-lbl">Not Started</div></div>
      <div class="rpt-sum-card"><div class="rpt-sum-num" style="color:var(--green)">${evidenceHave}</div><div class="rpt-sum-lbl">Evidence Items ✓</div></div>
      <div class="rpt-sum-card"><div class="rpt-sum-num" style="color:#f59e0b">${evidenceTodo}</div><div class="rpt-sum-lbl">On To-Do List</div></div>
      <div class="rpt-sum-card"><div class="rpt-sum-num" style="color:var(--red)">${evidenceMissing}</div><div class="rpt-sum-lbl">Still Missing</div></div>
    </div>`;

  reportSections.forEach(({ sec, items }) => {
    const secHave = items.filter(i => i.readiness === 'full').length;
    html += `<div class="rpt-section">
      <div class="rpt-section-hdr">
        <span>${sec.name}</span>
        <span class="rpt-section-score">${secHave} of ${items.length} fully ready</span>
      </div>`;

    items.forEach(({ item, rows, readiness, haveCount, totalCount }) => {
      const rLabel = readiness === 'full' ? '✅ All Evidence Ready' : readiness === 'partial' ? `⚠️ ${haveCount} of ${totalCount} items` : '❌ Evidence Needed';
      html += `<div class="rpt-item">
        <div class="rpt-item-hdr">
          <div>
            <div class="rpt-item-title">${item.title}</div>
            <div class="rpt-item-sub">${item.fullText}</div>
          </div>
          <div class="rpt-readiness ${readiness}">${rLabel}</div>
        </div>
        <div class="rpt-evidence-list">`;

      rows.forEach(row => {
        const icon = row.status === 'have' ? '✅' : row.status === 'todo' ? '📋' : '❌';
        const typeTag = row.type === 'physical' ? '<span style="font-size:.7rem;background:#e0e7ff;color:#3730a3;padding:1px 6px;border-radius:10px;margin-left:4px">physical</span>'
          : row.type === 'policy' ? '<span style="font-size:.7rem;background:#dcfce7;color:#166534;padding:1px 6px;border-radius:10px;margin-left:4px">policy</span>'
          : '<span style="font-size:.7rem;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:10px;margin-left:4px">policy+doc</span>';
        html += `<div class="rpt-ev-row ${row.status}">
          <span class="rpt-ev-icon">${icon}</span>
          <div class="rpt-ev-text">
            <span>${row.label}</span>${typeTag}
            ${row.source ? `<div class="rpt-ev-source">→ ${row.source}</div>` : row.status === 'missing' ? `<div class="rpt-ev-source" style="color:var(--red)">→ Not yet provided</div>` : ''}
          </div>
        </div>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
  });

  wrap.innerHTML = html;
}

</script>
